<!doctype html><html><head><meta charset="utf-8"><style>
  body{margin:0;width:280px;font-family:Inter,system-ui,sans-serif;background:#0A1628;color:#F0F4FF;padding:14px}
  h1{font-size:13px;margin:0 0 2px;letter-spacing:.04em}
  .sub{font-size:11px;color:#64748B;margin-bottom:12px}
  label{display:block;font-size:10px;text-transform:uppercase;color:#64748B;margin:10px 0 3px;letter-spacing:.06em}
  select,input{width:100%;box-sizing:border-box;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:7px 8px;color:#F0F4FF;font-size:13px}
  .row{display:flex;gap:8px}.row>*{flex:1}
  button{width:100%;margin-top:14px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:#fff;border:0;border-radius:9px;padding:9px;font-weight:600;font-size:13px;cursor:pointer}
  .saved{color:#10B981;font-size:11px;text-align:center;margin-top:8px;height:14px}
  .hint{font-size:10px;color:#475569;margin-top:4px}
</style></head><body>
  <h1>Breach Guardian</h1>
  <div class="sub">Configure the account it watches.</div>
  <label>Firm / account</label>
  <select id="firmKey"></select>
  <label>How to read your equity</label>
  <select id="mode">
    <option value="manual">Manual (type it)</option>
    <option value="auto">Auto-detect on page</option>
    <option value="selector">CSS selector on page</option>
  </select>
  <div id="manualWrap">
    <label>Current equity ($)</label>
    <input id="manualBalance" type="number" />
  </div>
  <div id="selectorWrap" style="display:none">
    <label>CSS selector for equity element</label>
    <input id="selector" placeholder="#equity" />
    <div class="hint">e.g. the element showing your balance.</div>
  </div>
  <div class="row">
    <div><label>Instrument</label><select id="instrument"></select></div>
    <div><label>Typical stop (pts)</label><input id="stop" type="number" value="20" /></div>
  </div>
  <button id="save">Save</button>
  <div class="saved" id="saved"></div>
  <script src="rules.js"></script>
  <script src="popup.js"></script>
</body></html>
