<!doctype html><html><head><meta charset="utf-8"><title>Demo Platform — Breach Guardian</title><style>
  body{margin:0;font-family:Inter,system-ui,sans-serif;background:#070d18;color:#e8eefc;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh}
  .panel{background:#0e1a30;border:1px solid #1e2d4a;border-radius:16px;padding:32px 40px;text-align:center}
  .lbl{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:#5b6b86}
  .eq{font-size:48px;font-weight:800;font-family:'JetBrains Mono',monospace;margin:6px 0}
  input[type=range]{width:340px;margin-top:18px}
  .tip{font-size:12px;color:#5b6b86;margin-top:22px;max-width:380px}
</style></head><body>
  <div class="panel">
    <div class="lbl">Account Equity (simulated platform)</div>
    <div class="eq" id="equity">$51,000</div>
    <input type="range" id="slider" min="48200" max="53000" value="51000" step="50" />
    <div class="tip">Drag to move your equity. With the Breach Guardian extension installed and set to
      <b>Auto-detect</b> (or selector <code>#equity</code>), the HUD in the corner updates live.</div>
  </div>
  <script>
    const s = document.getElementById("slider"), e = document.getElementById("equity");
    s.addEventListener("input", () => { e.textContent = "$" + Number(s.value).toLocaleString(); });
  </script>
</body></html>
